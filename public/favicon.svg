    <rect x="11" width="9" height="9" rx="2.5" fill="#fff" opacity="0.5"/>
    <rect y="11" width="9" height="9" rx="2.5" fill="#fff" opacity="0.5"/>
    <rect x="11" y="11" width="9" height="9" rx="2.5" fill="#fff" opacity="0.95"/>
  </g>
